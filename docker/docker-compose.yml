version: "3.8"

services:
  crypto-signal-classifier:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: crypto-signal-classifier
    ports:
      - "8000:8000"
    volumes:
      - ../app/models:/project/app/models:ro
    environment:
      - PYTHONPATH=/project
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
