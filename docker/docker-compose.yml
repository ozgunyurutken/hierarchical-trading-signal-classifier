version: "3.8"

services:
  crypto-signal-classifier:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: crypto-signal-classifier:mvp
    container_name: crypto-signal-classifier
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/project
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
